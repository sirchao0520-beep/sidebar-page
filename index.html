<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教學戰術側邊欄 V3</title>
    <style>
        /* [核心渲染] */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: system-ui, -apple-system, sans-serif; background-color: #0f1115; color: #e0e0e0; display: flex; flex-direction: column; height: 100vh; overflow-y: auto; overflow-x: hidden; padding: 12px; transition: padding 0.3s; }
        
        /* [頂部導航] */
        .nav-bar { display: flex; gap: 8px; margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px solid #2a2d35; transition: all 0.3s; }
        .toggle-btn { flex: 1; background: #1e2128; color: #888; border: 1px solid #333; padding: 8px 4px; border-radius: 6px; cursor: pointer; font-size: 0.8rem; font-weight: bold; }
        .toggle-btn.active { background: #2c313c; color: #fff; border-color: #555; box-shadow: inset 0 2px 4px rgba(0,0,0,0.5); }
        
        /* [模組框架] */
        .widget { background: #1a1d24; padding: 16px; border-radius: 10px; border-top: 3px solid #4CAF50; box-shadow: 0 6px 12px rgba(0,0,0,0.4); margin-bottom: 16px; transition: all 0.3s; }
        .widget.hidden { display: none; }
        .widget.clock { border-top-color: #9C27B0; }
        .widget.timer { border-top-color: #FF9800; }
        .widget.rng { border-top-color: #2196F3; }
        h3 { margin-bottom: 14px; font-size: 0.85rem; color: #aaa; text-transform: uppercase; letter-spacing: 1px; display: flex; justify-content: space-between; align-items: center; transition: all 0.3s;}
        
        /* [表單控制：與執行按鈕分離] */
        .setting-group { display: flex; gap: 8px; margin-bottom: 12px; transition: all 0.3s; overflow: hidden; }
        .action-group { display: flex; gap: 8px; margin-top: 10px; }
        
        select { flex: 1; min-width: 0; padding: 8px; background: #0f1115; border: 1px solid #333; color: white; border-radius: 6px; font-size: 0.9rem; appearance: none; outline: none; cursor: pointer; text-align: center;}
        select:focus { border-color: #4CAF50; }
        
        /* [顯示螢幕] */
        .display-screen { font-size: 2.2rem; text-align: center; font-family: 'Courier New', monospace; margin: 12px 0; background: #0a0c0f; padding: 15px 5px; border-radius: 6px; color: #fff; font-weight: bold; border: 1px solid #222;}
        .display-screen.clock-mode { font-size: 1.8rem; color: #E040FB; border: none; background: transparent; padding: 5px; margin: 0; }
        .display-screen.rng-mode { font-size: 2rem; color: #64B5F6; }
        
        /* [能量棒] */
        .energy-bar-container { width: 100%; height: 40px; background: #0a0c0f; border-radius: 6px; border: 1px solid #333; margin: 12px 0; overflow: hidden; display: none; position: relative;}
        .energy-bar-fill { height: 100%; width: 100%; background: #4CAF50; transition: width 1s linear, background-color 0.5s; }
        .energy-bar-text { position: absolute; width: 100%; text-align: center; line-height: 40px; color: #fff; font-weight: bold; font-family: monospace; font-size: 1.2rem; text-shadow: 1px 1px 2px #000; mix-blend-mode: difference;}
        
        /* [按鈕] */
        button.action-btn { background: #2c313c; color: #fff; border: 1px solid #444; padding: 10px; border-radius: 6px; cursor: pointer; width: 100%; font-weight: bold; }
        button.primary.timer { background: #FF9800; color: #000; border: none; }
        button.primary.rng { background: #2196F3; color: #000; border: none; }
        
        /* [極簡戰鬥模式 Compact Mode] */
        body.compact-mode .nav-bar { display: none; }
        body.compact-mode h3 { display: none; }
        body.compact-mode .setting-group { display: none; }
        body.compact-mode .widget { padding: 8px; margin-bottom: 0; }
        body.compact-mode { padding: 4px; background: transparent; }
        
        /* 懸浮控制開關 */
        .compact-toggle { position: fixed; bottom: 20px; right: 20px; width: 45px; height: 45px; background: #333; border: 2px solid #555; border-radius: 50%; color: white; font-size: 1.2rem; display: flex; justify-content: center; align-items: center; cursor: pointer; z-index: 1000; opacity: 0.6; transition: all 0.2s; box-shadow: 0 4px 8px rgba(0,0,0,0.5); }
        .compact-toggle:active { opacity: 1; transform: scale(0.9); }
    </style>
</head>
<body>

    <div class="nav-bar">
        <button class="toggle-btn active" onclick="SystemLogic.toggleModule('mod-clock', this)">🕒 時鐘</button>
        <button class="toggle-btn active" onclick="SystemLogic.toggleModule('mod-timer', this)">⏳ 計時</button>
        <button class="toggle-btn active" onclick="SystemLogic.toggleModule('mod-rng', this)">🎯 點名</button>
    </div>

    <div class="widget clock" id="mod-clock">
        <h3>即時時鐘</h3>
        <div class="display-screen clock-mode" id="realTimeClock">00:00:00</div>
    </div>

    <div class="widget timer" id="mod-timer">
        <h3>
            <span>倒數計時</span>
            <select id="timerMode" style="width: auto; padding: 2px 5px; font-size: 0.75rem; border-color:#555;" onchange="SystemLogic.switchTimerMode()">
                <option value="number">數字</option>
                <option value="bar">能量棒</option>
            </select>
        </h3>
        <div class="setting-group">
            <select id="minSelect"></select>
            <select id="secSelect"></select>
        </div>
        
        <div class="display-screen" id="timerDisplayNumber">00:00</div>
        <div class="energy-bar-container" id="timerDisplayBar">
            <div class="energy-bar-fill" id="energyBarFill"></div>
            <div class="energy-bar-text" id="energyBarText">00:00</div>
        </div>

        <div class="action-group">
            <button class="action-btn primary timer" onclick="SystemLogic.startTimer()" id="timerBtn">啟動</button>
            <button class="action-btn" onclick="SystemLogic.stopTimer()">暫停</button>
        </div>
    </div>

    <div class="widget rng" id="mod-rng">
        <h3>隨機狙擊</h3>
        <div class="setting-group">
            <select id="minRangeSelect" title="起始號碼"></select>
            <span style="align-self:center; color:#555;">-</span>
            <select id="maxRangeSelect" title="結束號碼"></select>
        </div>
        
        <div class="display-screen rng-mode" id="randomResult">--</div>
        
        <div class="action-group">
            <button class="action-btn primary rng" onclick="SystemLogic.drawNumber()">鎖定目標</button>
        </div>
    </div>

    <div class="compact-toggle" onclick="SystemLogic.toggleCompactMode()" id="compactBtn" title="切換極簡模式">🗜️</div>

    <script>
        const SystemLogic = {
            timerInterval: null, totalTime: 0, remainingTime: 0, isRunning: false, isCompact: false,

            init: function() {
                this.buildDropdowns();
                this.startClock();
                this.switchTimerMode();
            },

            buildDropdowns: function() {
                const minSel = document.getElementById('minSelect');
                const secSel = document.getElementById('secSelect');
                const rngMin = document.getElementById('minRangeSelect');
                const rngMax = document.getElementById('maxRangeSelect');
                
                // 構建時間選單 0-60
                for (let i = 0; i <= 60; i++) {
                    minSel.add(new Option(i + ' 分', i));
                    if(i < 60) secSel.add(new Option(i + ' 秒', i));
                }
                minSel.value = 1; secSel.value = 0;

                // 構建點名選單 1-60 (預設班級最大人數)
                for (let i = 1; i <= 60; i++) {
                    rngMin.add(new Option('起: ' + i + '號', i));
                    rngMax.add(new Option('迄: ' + i + '號', i));
                }
                rngMin.value = 1; rngMax.value = 30; // 預設 1-30 號
            },

            toggleCompactMode: function() {
                this.isCompact = !this.isCompact;
                const body = document.body;
                const btn = document.getElementById('compactBtn');
                if (this.isCompact) {
                    body.classList.add('compact-mode');
                    btn.textContent = '👁️'; // 睜眼圖示：代表點擊恢復檢視
                } else {
                    body.classList.remove('compact-mode');
                    btn.textContent = '🗜️'; // 壓縮圖示：代表點擊進入壓縮
                }
            },

            startClock: function() {
                setInterval(() => {
                    const now = new Date();
                    document.getElementById('realTimeClock').textContent = 
                        `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}:${now.getSeconds().toString().padStart(2, '0')}`;
                }, 1000);
            },

            toggleModule: function(id, btn) {
                const mod = document.getElementById(id);
                mod.classList.toggle('hidden');
                btn.classList.toggle('active');
            },

            switchTimerMode: function() {
                const mode = document.getElementById('timerMode').value;
                document.getElementById('timerDisplayNumber').style.display = mode === 'number' ? 'block' : 'none';
                document.getElementById('timerDisplayBar').style.display = mode === 'bar' ? 'block' : 'none';
            },

            startTimer: function() {
                if (this.isRunning) return;
                const btn = document.getElementById('timerBtn');
                
                if (this.remainingTime === 0) {
                    this.totalTime = (parseInt(document.getElementById('minSelect').value) * 60) + parseInt(document.getElementById('secSelect').value);
                    this.remainingTime = this.totalTime;
                }
                if (this.remainingTime <= 0) return;

                this.isRunning = true;
                btn.textContent = "重置";
                btn.onclick = () => this.resetTimer();
                
                document.getElementById('timerDisplayNumber').style.color = "#fff";
                document.getElementById('energyBarFill').style.background = "#4CAF50";
                this.updateDisplay();

                this.timerInterval = setInterval(() => {
                    this.remainingTime--;
                    this.updateDisplay();
                    if (this.remainingTime <= 0) this.triggerTimeUp();
                }, 1000);
            },

            stopTimer: function() {
                clearInterval(this.timerInterval);
                this.isRunning = false;
                const btn = document.getElementById('timerBtn');
                btn.textContent = "繼續";
                btn.onclick = () => this.startTimer();
            },

            resetTimer: function() {
                this.stopTimer();
                this.remainingTime = 0;
                const btn = document.getElementById('timerBtn');
                btn.textContent = "啟動";
                btn.onclick = () => this.startTimer();
                document.getElementById('timerDisplayNumber').textContent = "00:00";
                document.getElementById('energyBarText').textContent = "00:00";
                document.getElementById('energyBarFill').style.width = "100%";
            },

            updateDisplay: function() {
                const m = Math.floor(this.remainingTime / 60).toString().padStart(2, '0');
                const s = (this.remainingTime % 60).toString().padStart(2, '0');
                const timeStr = `${m}:${s}`;
                
                document.getElementById('timerDisplayNumber').textContent = timeStr;
                const pct = (this.remainingTime / this.totalTime) * 100;
                const barFill = document.getElementById('energyBarFill');
                barFill.style.width = `${pct}%`;
                document.getElementById('energyBarText').textContent = timeStr;

                if (pct <= 20) barFill.style.background = "#f44336";
                else if (pct <= 50) barFill.style.background = "#FFC107";
            },

            triggerTimeUp: function() {
                this.stopTimer();
                this.remainingTime = 0;
                document.getElementById('timerDisplayNumber').textContent = "TIME UP";
                document.getElementById('timerDisplayNumber').style.color = "#f44336";
                document.getElementById('energyBarText').textContent = "TIME UP";
                document.getElementById('energyBarFill').style.width = "0%";
            },

            drawNumber: function() {
                const min = parseInt(document.getElementById('minRangeSelect').value);
                const max = parseInt(document.getElementById('maxRangeSelect').value);
                const display = document.getElementById('randomResult');
                
                if (min > max) { display.textContent = "ERR"; return; }

                display.style.color = "#fff";
                let ticks = 0; 
                clearInterval(this.shuffleInterval);
                this.shuffleInterval = setInterval(() => {
                    display.textContent = `${Math.floor(Math.random() * (max - min + 1)) + min} 號`;
                    ticks++;
                    if (ticks >= 15) {
                        clearInterval(this.shuffleInterval);
                        display.style.color = "#64B5F6";
                    }
                }, 50);
            }
        };

        SystemLogic.init();
    </script>
</body>
</html>
