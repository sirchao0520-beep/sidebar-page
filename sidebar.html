<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教學戰術側邊欄 V2</title>
    <style>
        /* [核心渲染] 精緻深色面板風格 */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: system-ui, -apple-system, sans-serif; background-color: #0f1115; color: #e0e0e0; display: flex; flex-direction: column; height: 100vh; overflow-y: auto; overflow-x: hidden; padding: 12px; }
        
        /* [頂部導航開關] */
        .nav-bar { display: flex; gap: 8px; margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px solid #2a2d35; }
        .toggle-btn { flex: 1; background: #1e2128; color: #888; border: 1px solid #333; padding: 8px 4px; border-radius: 6px; cursor: pointer; font-size: 0.8rem; font-weight: bold; transition: all 0.2s; }
        .toggle-btn.active { background: #2c313c; color: #fff; border-color: #555; box-shadow: inset 0 2px 4px rgba(0,0,0,0.5); }
        
        /* [模組共用框架] */
        .widget { background: #1a1d24; padding: 16px; border-radius: 10px; border-top: 3px solid #4CAF50; box-shadow: 0 6px 12px rgba(0,0,0,0.4); margin-bottom: 16px; transition: opacity 0.3s, transform 0.3s; }
        .widget.hidden { display: none; }
        .widget.clock { border-top-color: #9C27B0; }
        .widget.timer { border-top-color: #FF9800; }
        .widget.rng { border-top-color: #2196F3; }
        
        h3 { margin-bottom: 14px; font-size: 0.85rem; color: #aaa; text-transform: uppercase; letter-spacing: 1px; display: flex; justify-content: space-between; align-items: center;}
        
        /* [下拉選單與表單控制] */
        .control-group { display: flex; gap: 8px; margin-bottom: 12px; }
        select { flex: 1; min-width: 0; padding: 8px; background: #0f1115; border: 1px solid #333; color: white; border-radius: 6px; font-family: inherit; font-size: 0.9rem; appearance: none; outline: none; cursor: pointer; text-align: center;}
        select:focus { border-color: #FF9800; }
        
        input[type="number"] { flex: 1; min-width: 0; padding: 8px; background: #0f1115; border: 1px solid #333; color: white; border-radius: 6px; text-align: center; font-family: monospace;}
        input[type="number"]:focus { border-color: #2196F3; outline: none; }
        
        /* [按鈕設計] */
        button.action-btn { background: #2c313c; color: #fff; border: 1px solid #444; padding: 10px; border-radius: 6px; cursor: pointer; width: 100%; font-weight: bold; transition: all 0.2s; }
        button.action-btn:hover { background: #3a414e; }
        button.primary.timer { background: #FF9800; color: #000; border: none; }
        button.primary.rng { background: #2196F3; color: #000; border: none; }
        
        /* [顯示螢幕 - 數字模式] */
        .display-screen { font-size: 2.2rem; text-align: center; font-family: 'Courier New', monospace; margin: 12px 0; background: #0a0c0f; padding: 15px 5px; border-radius: 6px; color: #fff; font-weight: bold; border: 1px solid #222;}
        .display-screen.clock-mode { font-size: 1.8rem; color: #E040FB; border: none; background: transparent; padding: 5px; }
        .display-screen.rng-mode { font-size: 1.8rem; color: #64B5F6; }
        
        /* [顯示螢幕 - 能量棒模式] */
        .energy-bar-container { width: 100%; height: 40px; background: #0a0c0f; border-radius: 6px; border: 1px solid #333; margin: 12px 0; overflow: hidden; display: none; position: relative;}
        .energy-bar-fill { height: 100%; width: 100%; background: #4CAF50; transition: width 1s linear, background-color 0.5s; }
        .energy-bar-text { position: absolute; width: 100%; text-align: center; line-height: 40px; color: #fff; font-weight: bold; font-family: monospace; font-size: 1.2rem; text-shadow: 1px 1px 2px #000; mix-blend-mode: difference;}
    </style>
</head>
<body>

    <div class="nav-bar">
        <button class="toggle-btn active" onclick="SystemLogic.toggleModule('mod-clock', this)">🕒 時鐘</button>
        <button class="toggle-btn active" onclick="SystemLogic.toggleModule('mod-timer', this)">⏳ 計時</button>
        <button class="toggle-btn active" onclick="SystemLogic.toggleModule('mod-rng', this)">🎯 點名</button>
    </div>

    <div class="widget clock" id="mod-clock">
        <h3>即時時鐘 (Clock)</h3>
        <div class="display-screen clock-mode" id="realTimeClock">00:00:00</div>
    </div>

    <div class="widget timer" id="mod-timer">
        <h3>
            <span>倒數計時</span>
            <select id="timerMode" style="width: auto; padding: 2px 5px; font-size: 0.75rem; border-color:#555;" onchange="SystemLogic.switchTimerMode()">
                <option value="number">數字模式</option>
                <option value="bar">能量棒模式</option>
            </select>
        </h3>
        
        <div class="control-group">
            <select id="minSelect" title="分鐘"></select>
            <select id="secSelect" title="秒數"></select>
        </div>
        
        <div class="display-screen" id="timerDisplayNumber">00:00</div>
        
        <div class="energy-bar-container" id="timerDisplayBar">
            <div class="energy-bar-fill" id="energyBarFill"></div>
            <div class="energy-bar-text" id="energyBarText">00:00</div>
        </div>

        <div class="control-group">
            <button class="action-btn primary timer" onclick="SystemLogic.startTimer()" id="timerBtn">啟動</button>
            <button class="action-btn" onclick="SystemLogic.stopTimer()">暫停</button>
        </div>
    </div>

    <div class="widget rng" id="mod-rng">
        <h3>隨機狙擊 (RNG)</h3>
        <div class="control-group">
            <input type="number" id="minRange" placeholder="起" value="1">
            <span style="align-self:center; color:#555;">-</span>
            <input type="number" id="maxRange" placeholder="迄" value="30">
        </div>
        <div class="display-screen rng-mode" id="randomResult">--</div>
        <button class="action-btn primary rng" onclick="SystemLogic.drawNumber()">鎖定目標</button>
    </div>

    <script>
        const SystemLogic = {
            timerInterval: null,
            totalTime: 0,
            remainingTime: 0,
            isRunning: false,

            // 系統初始化
            init: function() {
                this.buildDropdowns();
                this.startClock();
                this.switchTimerMode(); // 初始化顯示模式
            },

            // [底層構建] 動態生成 0-60 的下拉選單
            buildDropdowns: function() {
                const minSelect = document.getElementById('minSelect');
                const secSelect = document.getElementById('secSelect');
                for (let i = 0; i <= 60; i++) {
                    const minOpt = new Option(i + ' 分', i);
                    const secOpt = new Option(i + ' 秒', i);
                    minSelect.add(minOpt);
                    if(i < 60) secSelect.add(secOpt);
                }
                minSelect.value = 1; // 預設 1 分鐘
                secSelect.value = 0;
            },

            // [時鐘模組]
            startClock: function() {
                setInterval(() => {
                    const now = new Date();
                    const h = now.getHours().toString().padStart(2, '0');
                    const m = now.getMinutes().toString().padStart(2, '0');
                    const s = now.getSeconds().toString().padStart(2, '0');
                    document.getElementById('realTimeClock').textContent = `${h}:${m}:${s}`;
                }, 1000);
            },

            // [UI 切換] 模組開關
            toggleModule: function(moduleId, btnElement) {
                const mod = document.getElementById(moduleId);
                if (mod.classList.contains('hidden')) {
                    mod.classList.remove('hidden');
                    btnElement.classList.add('active');
                } else {
                    mod.classList.add('hidden');
                    btnElement.classList.remove('active');
                }
            },

            // [UI 切換] 計時器顯示模式
            switchTimerMode: function() {
                const mode = document.getElementById('timerMode').value;
                const numDisplay = document.getElementById('timerDisplayNumber');
                const barDisplay = document.getElementById('timerDisplayBar');
                
                if (mode === 'number') {
                    numDisplay.style.display = 'block';
                    barDisplay.style.display = 'none';
                } else {
                    numDisplay.style.display = 'none';
                    barDisplay.style.display = 'block';
                }
            },

            // [計時器模組]
            startTimer: function() {
                if (this.isRunning) return;
                
                const btn = document.getElementById('timerBtn');
                
                // 讀取時間設定
                if (this.remainingTime === 0) {
                    const min = parseInt(document.getElementById('minSelect').value);
                    const sec = parseInt(document.getElementById('secSelect').value);
                    this.totalTime = (min * 60) + sec;
                    this.remainingTime = this.totalTime;
                }

                if (this.remainingTime <= 0) return;

                this.isRunning = true;
                btn.textContent = "重置";
                btn.onclick = () => this.resetTimer();
                
                // 恢復顏色
                document.getElementById('timerDisplayNumber').style.color = "#fff";
                document.getElementById('energyBarFill').style.background = "#4CAF50";

                this.updateDisplay(); // 立即更新一次畫面

                this.timerInterval = setInterval(() => {
                    this.remainingTime--;
                    this.updateDisplay();
                    
                    if (this.remainingTime <= 0) {
                        this.stopTimer();
                        this.triggerTimeUp();
                    }
                }, 1000);
            },

            stopTimer: function() {
                clearInterval(this.timerInterval);
                this.isRunning = false;
                const btn = document.getElementById('timerBtn');
                btn.textContent = "繼續";
                btn.onclick = () => this.startTimer();
            },

            resetTimer: function() {
                this.stopTimer();
                this.remainingTime = 0;
                
                const btn = document.getElementById('timerBtn');
                btn.textContent = "啟動";
                btn.onclick = () => this.startTimer();
                
                // 重置視覺
                document.getElementById('timerDisplayNumber').textContent = "00:00";
                document.getElementById('timerDisplayNumber').style.color = "#fff";
                document.getElementById('energyBarText').textContent = "00:00";
                document.getElementById('energyBarFill').style.width = "100%";
                document.getElementById('energyBarFill').style.background = "#4CAF50";
            },

            updateDisplay: function() {
                const m = Math.floor(this.remainingTime / 60).toString().padStart(2, '0');
                const s = (this.remainingTime % 60).toString().padStart(2, '0');
                const timeStr = `${m}:${s}`;
                
                // 更新數字模式
                document.getElementById('timerDisplayNumber').textContent = timeStr;
                
                // 更新能量棒模式
                const percentage = (this.remainingTime / this.totalTime) * 100;
                const barFill = document.getElementById('energyBarFill');
                barFill.style.width = `${percentage}%`;
                document.getElementById('energyBarText').textContent = timeStr;

                // 能量棒變色機制 (低於 50% 變黃，低於 20% 變紅)
                if (percentage <= 20) {
                    barFill.style.background = "#f44336"; // 警告紅
                } else if (percentage <= 50) {
                    barFill.style.background = "#FFC107"; // 警戒黃
                }
            },

            triggerTimeUp: function() {
                this.remainingTime = 0;
                document.getElementById('timerDisplayNumber').textContent = "TIME UP";
                document.getElementById('timerDisplayNumber').style.color = "#f44336";
                document.getElementById('energyBarText').textContent = "TIME UP";
                document.getElementById('energyBarFill').style.width = "0%";
            },

            // [點名模組]
            drawNumber: function() {
                const min = parseInt(document.getElementById('minRange').value);
                const max = parseInt(document.getElementById('maxRange').value);
                const display = document.getElementById('randomResult');
                
                if (isNaN(min) || isNaN(max) || min > max) {
                    display.textContent = "ERR"; return;
                }

                display.style.color = "#fff";
                let ticks = 0; const maxTicks = 15;
                
                clearInterval(this.shuffleInterval);
                this.shuffleInterval = setInterval(() => {
                    const randomNum = Math.floor(Math.random() * (max - min + 1)) + min;
                    display.textContent = `${randomNum} 號`;
                    ticks++;
                    
                    if (ticks >= maxTicks) {
                        clearInterval(this.shuffleInterval);
                        display.style.color = "#64B5F6";
                    }
                }, 50);
            }
        };

        // 啟動系統
        SystemLogic.init();
    </script>
</body>
</html>
